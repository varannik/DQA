AWSTemplateFormatVersion: '2010-09-09'
Description: DataSentinel foundation — VPC, RDS, S3, SQS, ECR, ECS cluster, Secrets

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  DbInstanceClass:
    Type: String
    Default: db.t3.micro
  EnableMultiAz:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  UseMultiAz: !Or [!Condition IsProd, !Equals [!Ref EnableMultiAz, 'true']]

Resources:
  # ── VPC ────────────────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub 'datasentinel-vpc-${Environment}'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub 'datasentinel-igw-${Environment}'

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'datasentinel-public-1-${Environment}'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'datasentinel-public-2-${Environment}'

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'datasentinel-private-1-${Environment}'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'datasentinel-private-2-${Environment}'

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  S3VpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable
        - !Ref PublicRouteTable

  # ── Security groups ────────────────────────────────────────────────────────
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB ingress
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'datasentinel-alb-sg-${Environment}'

  PlatformApiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Platform API tasks
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub 'datasentinel-platform-api-sg-${Environment}'

  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Engine workers - no inbound
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'datasentinel-worker-sg-${Environment}'

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS PostgreSQL
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref PlatformApiSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub 'datasentinel-rds-sg-${Environment}'

  # ── Secrets ────────────────────────────────────────────────────────────────
  DbMasterSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'datasentinel/${Environment}/db-master'
      Description: RDS master credentials
      GenerateSecretString:
        SecretStringTemplate: '{"username":"datasentinel"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludePunctuation: true

  JwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'datasentinel/${Environment}/jwt-secret'
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true

  MessageSigningSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'datasentinel/${Environment}/message-signing-key'
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true

  # ── RDS ────────────────────────────────────────────────────────────────────
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: DataSentinel private subnets
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  PlatformDatabase:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub 'datasentinel-db-${Environment}'
      Engine: postgres
      EngineVersion: '15'
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: '20'
      StorageType: gp3
      DBName: datasentinel
      MasterUsername: !Sub '{{resolve:secretsmanager:${DbMasterSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DbMasterSecret}:SecretString:password}}'
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      DBSubnetGroupName: !Ref DbSubnetGroup
      MultiAZ: !If [UseMultiAz, true, false]
      PubliclyAccessible: false
      BackupRetentionPeriod: !If [IsProd, 7, 1]
      DeletionProtection: !If [IsProd, true, false]

  DbMasterSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DbMasterSecret
      TargetId: !Ref PlatformDatabase
      TargetType: AWS::RDS::DBInstance

  # ── S3 ─────────────────────────────────────────────────────────────────────
  DatasetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'datasentinel-datasets-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ModelsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'datasentinel-models-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── SQS (request/result + DLQ) ─────────────────────────────────────────────
  DqaRunRequestedDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'dqa-run-requested-dlq-${Environment}'
      MessageRetentionPeriod: 1209600

  DqaRunRequestedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'dqa-run-requested-${Environment}'
      VisibilityTimeout: 900
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DqaRunRequestedDlq.Arn
        maxReceiveCount: 3

  DqaRunCompletedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'dqa-run-completed-${Environment}'
      VisibilityTimeout: 120
      MessageRetentionPeriod: 345600

  CorrectionRequestedDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'correction-requested-dlq-${Environment}'
      MessageRetentionPeriod: 1209600

  CorrectionRequestedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'correction-requested-${Environment}'
      VisibilityTimeout: 900
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt CorrectionRequestedDlq.Arn
        maxReceiveCount: 3

  CorrectionCompletedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'correction-completed-${Environment}'
      VisibilityTimeout: 120
      MessageRetentionPeriod: 345600

  AiPredictRequestedDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'ai-predict-requested-dlq-${Environment}'
      MessageRetentionPeriod: 1209600

  AiPredictRequestedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'ai-predict-requested-${Environment}'
      VisibilityTimeout: 900
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AiPredictRequestedDlq.Arn
        maxReceiveCount: 3

  AiTrainingTriggeredDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'ai-training-triggered-dlq-${Environment}'
      MessageRetentionPeriod: 1209600

  AiTrainingTriggeredQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'ai-training-triggered-${Environment}'
      VisibilityTimeout: 900
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AiTrainingTriggeredDlq.Arn
        maxReceiveCount: 3

  # ── ECR ────────────────────────────────────────────────────────────────────
  PlatformApiEcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: datasentinel-platform-api
      ImageScanningConfiguration:
        ScanOnPush: true

  DqaEngineEcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: datasentinel-dqa-engine
      ImageScanningConfiguration:
        ScanOnPush: true

  CorrectionEngineEcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: datasentinel-correction-engine
      ImageScanningConfiguration:
        ScanOnPush: true

  AiEngineEcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: datasentinel-ai-engine
      ImageScanningConfiguration:
        ScanOnPush: true

  # ── ECS cluster ────────────────────────────────────────────────────────────
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub 'datasentinel-${Environment}'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

Outputs:
  VpcId:
    Value: !Ref VPC
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-VpcId'
  PublicSubnetIds:
    Value: !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2]]
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-PublicSubnetIds'
  PrivateSubnetIds:
    Value: !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-PrivateSubnetIds'
  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-AlbSecurityGroupId'
  PlatformApiSecurityGroupId:
    Value: !Ref PlatformApiSecurityGroup
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-PlatformApiSecurityGroupId'
  WorkerSecurityGroupId:
    Value: !Ref WorkerSecurityGroup
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-WorkerSecurityGroupId'
  EcsClusterName:
    Value: !Ref EcsCluster
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-EcsClusterName'
  PlatformDbEndpoint:
    Value: !GetAtt PlatformDatabase.Endpoint.Address
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-PlatformDbEndpoint'
  DbMasterSecretArn:
    Value: !Ref DbMasterSecret
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-DbMasterSecretArn'
  JwtSecretArn:
    Value: !Ref JwtSecret
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-JwtSecretArn'
  MessageSigningSecretArn:
    Value: !Ref MessageSigningSecret
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-MessageSigningSecretArn'
  DatasetsBucketName:
    Value: !Ref DatasetsBucket
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-DatasetsBucketName'
  ModelsBucketName:
    Value: !Ref ModelsBucket
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-ModelsBucketName'
  DqaRunRequestedQueueUrl:
    Value: !Ref DqaRunRequestedQueue
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-DqaRunRequestedQueueUrl'
  DqaRunCompletedQueueUrl:
    Value: !Ref DqaRunCompletedQueue
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-DqaRunCompletedQueueUrl'
  CorrectionRequestedQueueUrl:
    Value: !Ref CorrectionRequestedQueue
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-CorrectionRequestedQueueUrl'
  CorrectionCompletedQueueUrl:
    Value: !Ref CorrectionCompletedQueue
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-CorrectionCompletedQueueUrl'
  AiPredictRequestedQueueUrl:
    Value: !Ref AiPredictRequestedQueue
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-AiPredictRequestedQueueUrl'
  AiTrainingTriggeredQueueUrl:
    Value: !Ref AiTrainingTriggeredQueue
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-AiTrainingTriggeredQueueUrl'
  PlatformApiEcrUri:
    Value: !GetAtt PlatformApiEcrRepo.RepositoryUri
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-PlatformApiEcrUri'
  DqaEngineEcrUri:
    Value: !GetAtt DqaEngineEcrRepo.RepositoryUri
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-DqaEngineEcrUri'
  CorrectionEngineEcrUri:
    Value: !GetAtt CorrectionEngineEcrRepo.RepositoryUri
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-CorrectionEngineEcrUri'
  AiEngineEcrUri:
    Value: !GetAtt AiEngineEcrRepo.RepositoryUri
    Export:
      Name: !Sub 'datasentinel-foundation-${Environment}-AiEngineEcrUri'
